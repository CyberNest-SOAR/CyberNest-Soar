services:

  # -----------------------------
  # Backend API + Database
  # -----------------------------

  db:
    extends:
      file: backend/infra/docker-compose.yml
      service: db
    networks:
      - soc_net

  api:
    extends:
      file: backend/infra/docker-compose.yml
      service: api
    depends_on:
      - db
    networks:
      - soc_net

  pgadmin:
    extends:
      file: backend/infra/docker-compose.yml
      service: pgadmin
    depends_on:
      - db
    networks:
      - soc_net


  # -----------------------------
  # SIEM Stack (Wazuh)
  # -----------------------------

  wazuh.manager:
    extends:
      file: siem/wazuh/single-node/docker-compose.yml
      service: wazuh.manager
    networks:
      - soc_net

  wazuh.indexer:
    extends:
      file: siem/wazuh/single-node/docker-compose.yml
      service: wazuh.indexer
    networks:
      - soc_net

  wazuh.dashboard:
    extends:
      file: siem/wazuh/single-node/docker-compose.yml
      service: wazuh.dashboard
    ports:
      - "8443:5601"   # avoid conflict with MISP 443
    depends_on:
      - wazuh.manager
      - wazuh.indexer
    networks:
      - soc_net


  # Optional Wazuh Agent
  wazuh.agent:
    extends:
      file: siem/wazuh/wazuh-agent/docker-compose.yml
      service: wazuh.agent
    depends_on:
      - wazuh.manager
    networks:
      - soc_net


  # -----------------------------
  # Network Detection Sensors
  # -----------------------------

  suricata1:
    extends:
      file: sensors/ndr/suricata/suricata1/docker-compose.suricata.yml
      service: suricata
    # keep network_mode: host from child (needed for packet capture)

  zeek:
    extends:
      file: sensors/ndr/zeek/docker-compose.yml
      service: zeek
    # keep network_mode: host from child (needed for packet capture)


  # -----------------------------
  # Endpoint Detection Sensor
  # -----------------------------

  velociraptor:
    extends:
      file: sensors/edr/velociraptor/docker-compose.yml
      service: velociraptor
    networks:
      - soc_net


  # -----------------------------
  # SOAR / Case Management
  # -----------------------------

  cassandra:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: cassandra
    networks:
      - soc_net

  # Named "elasticsearch" so TheHive/Cortex child depends_on resolve (child already uses 9201:9200 to avoid Wazuh)
  elasticsearch:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: elasticsearch
    networks:
      - soc_net

  minio:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: minio
    networks:
      - soc_net

  cortex.local:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: cortex.local
    depends_on:
      - elasticsearch
    networks:
      - soc_net

  thehive:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: thehive
    depends_on:
      - cassandra
      - elasticsearch
      - minio
      - cortex.local
    networks:
      - soc_net


  # -----------------------------
  # Threat Intelligence (MISP)
  # -----------------------------

  misp_mysql:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: misp_mysql
    networks:
      - soc_net

  redis:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: redis
    networks:
      - soc_net

  misp:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: misp.local
    depends_on:
      - misp_mysql
      - redis
    networks:
      - soc_net

  misp_modules:
    extends:
      file: services/orchestrator/thehive/docker-compose.yml
      service: misp-modules
    depends_on:
      - misp
      - redis
    links:
      - misp:misp.local   # child image may expect hostname misp.local
    networks:
      - soc_net


# -----------------------------
# Shared Network
# -----------------------------

networks:
  soc_net:
    driver: bridge
  wazuh:
    driver: bridge

# Named volumes must match exactly what extended child compose files use.
# Backend (backend/infra/docker-compose.yml)
volumes:
  postgres_data:

# Wazuh single-node (siem/wazuh/single-node/docker-compose.yml)
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:

# TheHive stack (services/orchestrator/thehive/docker-compose.yml)
  miniodata:
  cassandradata:
  elasticsearchdata:
  thehivedata:
  mispsqldata:
