filebeat.inputs:
  - type: filestream
    id: velociraptor_logs
    enabled: true
    paths:
      - /data/*.log
      - /data/**/*.log
      - /data/*.json
      - /data/**/*.json

processors:
  - add_host_metadata: ~

output.elasticsearch:
  hosts: ["http://host.docker.internal:9200"]

setup.kibana:
  host: "http://host.docker.internal:5601"