services:
  velociraptor:
    image: graype28/velociraptor-fixed:latest
    container_name: velociraptor

    ports:
      - "8000:8000"
      - "8889:8889"

    volumes:
      - ./velociraptor-data:/data
      - ./velociraptor-logs:/logs

    command:
      [
        "/opt/velociraptor/linux/velociraptor",
        "--config",
        "/data/config.yaml",
        "frontend"
      ]

  filebeat:
    image: docker.elastic.co/beats/filebeat-oss:7.10.2
    container_name: filebeat

    user: root

    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./velociraptor-logs:/logs:ro

    command: filebeat -e --strict.perms=false