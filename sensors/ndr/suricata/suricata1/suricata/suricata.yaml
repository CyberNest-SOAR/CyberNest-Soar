%YAML 1.1
---

# suricata-lab/suricata/suricata.yaml
vars:
  address-groups:
    HOME_NET: "[172.20.10.3]"   # Replace with your VM IP
    EXTERNAL_NET: "!$HOME_NET"

default-rule-path: /etc/suricata/rules

rule-files:
  - phishing.rules
  - ddos.rules
  - brute-force.rules

outputs:
  - eve-log:
      enabled: yes
      filetype: regular
      filename: /var/log/suricata/eve.json
      types:
        - alert:
            payload: yes
            http-body: yes
        - http:
        - dns:
        - flow:
        - ssh
        - tls

logging:
  default-log-level: info
