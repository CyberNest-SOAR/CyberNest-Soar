<ossec_config>
  <client>
    <server>
      <address>wazuh.manager</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu20, ubuntu20.04</config-profile>
  </client>
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>100000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/suricata/eve.json</location>
  </localfile>
  <localfile>
    <log_format>json</log_format>
    <location>/usr/local/zeek/logs/wazuh_zeek.log</location>
  </localfile>
  <localfile>
    <log_format>json</log_format>
    <location>/var/log/velociraptor/events.json</location>
  </localfile>
</ossec_config>
